<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guess Number Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🎯 Guess the Number</h1>
    <p>Choose difficulty and start guessing!</p>
    <p id="best"></p>
    <p id="timer">⏱ Time: 0s</p>
    <div class="difficulty">
      <button onclick="startGame('1')">Easy</button>
      <button onclick="startGame('2')">Medium</button>
      <button onclick="startGame('3')">Hard</button>
      <button onclick="resetBestScore()">🗑 Reset Best Score</button>
    </div>

    <p id="range"></p>

    <input type="number" id="guessInput" placeholder="Enter your guess">
    <button onclick="checkGuess()">Submit</button>

    <p id="result"></p>

    <button class="restart" onclick="restartGame()">🔄 Restart</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
