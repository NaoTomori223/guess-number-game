<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guess Number Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🎯 Guess the Number</h1>

  <p id="best"></p>
  <p id="timer">⏱ Time: 0.00s</p>

  <div class="difficulty">
    <button onclick="startGame('1')">Easy</button>
    <button onclick="startGame('2')">Medium</button>
    <button onclick="startGame('3')">Hard</button>
  </div>

  <p id="range"></p>

  <input type="number" id="guessInput" placeholder="Enter your guess">
  <button onclick="checkGuess()">Submit</button>

  <p id="result"></p>

  <button onclick="restartGame()">🔄 Restart</button>
  <button onclick="resetBestScore()">🗑 Reset</button>

  <h3>🏆 Leaderboard (Top 5)</h3>
  <ul id="leaderboard"></ul>
</div>

<!-- 音效 -->
<audio id="winSound">
  <source src="https://www.soundjay.com/buttons/sounds/button-4.mp3">
</audio>

<script src="script.js"></script>
</body>
</html>
